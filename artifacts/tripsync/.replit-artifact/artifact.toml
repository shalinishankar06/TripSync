kind = "web"
previewPath = "/"
title = "TripSync"
version = "1.0.0"
id = "artifacts/tripsync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22645

[services.development]
run = "pnpm --filter @workspace/tripsync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tripsync", "run", "build" ]
publicDir = "artifacts/tripsync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22645"
BASE_PATH = "/"
